<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: "Tip Sheet 2" }}</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      max-width: 720px;
      margin: 2rem auto;
      padding: 0 1.25rem;
      line-height: 1.6;
      color: #1d1d1f;
      background: #ffffff;
    }
    h1, h2, h3 { line-height: 1.25; margin-top: 2rem; }
    h1 { font-size: 2rem; }
    h2 { font-size: 1.35rem; }
    h3 { font-size: 1.1rem; }
    a { color: #0071e3; text-decoration: none; }
    a:hover { text-decoration: underline; }
    code { background: #f5f5f7; padding: 0.1em 0.35em; border-radius: 4px; font-size: 0.95em; }
    hr { border: none; border-top: 1px solid #e5e5ea; margin: 2rem 0; }
    em { color: #6e6e73; }
  </style>
</head>
<body>
{{ content }}
</body>
</html>
